  wordpress:
    build: requirements/wordpress
    ports:
      - "80:80"
    depends_on:
      - mariadb
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inc_network
    env_file:
      - .env
    restart: always

volumes:
  # nginx_data:
  #   driver: local
  #   driver_opts:
  #     type: none
