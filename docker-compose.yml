  # maria_data:
  #   driver: local
  #   driver_opts:
  #     type: none
  #     device: /home/yael-yas/maria_data
  #     o: bind
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      device: /home/yael-yas/data/wordpress
      o: bind

networks:
  inc_network:
    driver: bridge